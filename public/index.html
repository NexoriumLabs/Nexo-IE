<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexorium IE Tools — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #060f0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(29,158,117,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29,158,117,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(29,158,117,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      gap: 8px;
    }

    .logo-area img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .logo-text {
      text-align: center;
    }

    .logo-text .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #e2e8f0;
      letter-spacing: 0.08em;
    }

    .logo-text .product {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #1D9E75;
      letter-spacing: 0.2em;
      margin-top: 2px;
    }

    .card {
      background: #0d1f1f;
      border: 0.5px solid rgba(29,158,117,0.2);
      border-radius: 16px;
      padding: 28px 24px;
    }

    .tabs {
      display: flex;
      background: #060f0f;
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 24px;
      border: 0.5px solid rgba(29,158,117,0.15);
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: #1D9E75;
      color: #fff;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 10px 14px;
      background: #060f0f;
      border: 0.5px solid rgba(29,158,117,0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #1D9E75;
    }

    .input-group input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .input-group select option {
      background: #0d1f1f;
    }

    .hidden { display: none; }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: #1D9E75;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
      letter-spacing: 0.02em;
    }

    .submit-btn:hover { background: #0F6E56; }

    .status-msg {
      font-size: 12px;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
      color: #5DCAA5;
    }

    .status-msg.error { color: #F09995; }

    .footer-text {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="logo-area">
      <img src="/nexorium-logo.png" alt="Nexorium Labs Logo" />
      <div class="logo-text">
        <div class="brand">NEXORIUM LABS</div>
        <div class="product">IE TOOLS</div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" id="login-tab">Login</button>
        <button class="tab" id="signup-tab">Sign up</button>
      </div>

      <form id="auth-form">
        <div class="input-group hidden" id="name-field">
          <label>Full name</label>
          <input id="name" type="text" placeholder="Mandeep Singh" />
        </div>

        <div class="input-group hidden" id="company-field">
          <label>Company name</label>
          <input id="company" type="text" placeholder="Jawand Sons Pvt. Ltd." />
        </div>

        <div class="input-group hidden" id="industry-field">
          <label>Industry type</label>
          <select id="industry">
            <option value="">Select industry</option>
            <option value="garment">Garment manufacturing</option>
            <option value="textile">Textile</option>
            <option value="footwear">Footwear</option>
            <option value="leather">Leather goods</option>
            <option value="other">Other manufacturing</option>
          </select>
        </div>

        <div class="input-group">
          <label>Email address</label>
          <input id="email" type="email" placeholder="you@company.com" required />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input id="password" type="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="submit-btn">Continue</button>
        <p class="status-msg" id="message"></p>
      </form>
    </div>

    <p class="footer-text">Nexorium Labs · Industrial Engineering Tools · v1.0</p>
  </div>

  <script>
    const loginTab = document.getElementById('login-tab');
    const signupTab = document.getElementById('signup-tab');
    const nameField = document.getElementById('name-field');
    const companyField = document.getElementById('company-field');
    const industryField = document.getElementById('industry-field');
    const msgBox = document.getElementById('message');
    let mode = 'login';

    const setMode = (m) => {
      mode = m;
      if (mode === 'signup') {
        signupTab.classList.add('active');
        loginTab.classList.remove('active');
        nameField.classList.remove('hidden');
        companyField.classList.remove('hidden');
        industryField.classList.remove('hidden');
      } else {
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
        nameField.classList.add('hidden');
        companyField.classList.add('hidden');
        industryField.classList.add('hidden');
      }
      msgBox.textContent = '';
      msgBox.className = 'status-msg';
    };

    loginTab.addEventListener('click', () => setMode('login'));
    signupTab.addEventListener('click', () => setMode('signup'));

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      msgBox.textContent = '';
      msgBox.className = 'status-msg';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const payload = { email, password };
      let url = '/api/login';

      if (mode === 'signup') {
        payload.name = document.getElementById('name').value.trim();
        payload.company_name = document.getElementById('company').value.trim();
        payload.industry_type = document.getElementById('industry').value;
        url = '/api/signup';
      }

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (!res.ok) {
          msgBox.textContent = data.message || 'Something went wrong.';
          msgBox.classList.add('error');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        if (mode === 'signup') {
          msgBox.textContent = `Welcome, ${data.user.name}! Redirecting...`;
        }

        setTimeout(() => { window.location.href = '/dashboard.html'; }, 800);

      } catch (err) {
        msgBox.textContent = 'Unable to connect to server.';
        msgBox.classList.add('error');
      }
    });
  </script>
</body>
</html>
