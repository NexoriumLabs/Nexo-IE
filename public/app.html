<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexorium IE Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="/nexorium-logo.png" alt="Nexorium" class="sidebar-logo" />
      <div class="sidebar-brand">
        <span class="brand-main">NEXORIUM LABS</span>
        <span class="brand-sub">IE TOOLS</span>
      </div>
      <button class="sidebar-close" id="sidebar-close">
        <i class="ti ti-x"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">WORKSPACE</div>

      <a class="nav-item" data-page="products">
        <i class="ti ti-layers-subtract"></i>
        <span>Products</span>
      </a>
      <a class="nav-item" data-page="time-study">
        <i class="ti ti-clock"></i>
        <span>Time study</span>
      </a>
      <a class="nav-item" data-page="operation-bulletin">
        <i class="ti ti-file-analytics"></i>
        <span>Operation bulletin</span>
      </a>
      <a class="nav-item" data-page="line-balancing">
        <i class="ti ti-adjustments-horizontal"></i>
        <span>Bottleneck Identification</span>
      </a>

      <div class="nav-section-label" style="margin-top:16px;">TRACKING</div>

      <a class="nav-item" data-page="efficiency">
        <i class="ti ti-chart-line"></i>
        <span>Efficiency tracker</span>
      </a>
      <a class="nav-item" data-page="loss-time">
        <i class="ti ti-clock-pause"></i>
        <span>Loss time monitor</span>
      </a>

      <div class="nav-section-label" style="margin-top:16px;">REPORTS</div>

      <a class="nav-item" data-page="reports">
        <i class="ti ti-report-analytics"></i>
        <span>Reports & summary</span>
      </a>
      <a class="nav-item" data-page="dashboard">
        <i class="ti ti-layout-dashboard"></i>
        <span>Dashboard</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">M</div>
        <div class="user-details">
          <span class="user-name" id="user-name">Loading...</span>
          <span class="user-plan">Free plan</span>
        </div>
      </div>
      <button class="logout-btn" id="logout-btn" title="Logout">
        <i class="ti ti-logout"></i>
      </button>
    </div>
  </aside>

  <!-- OVERLAY for mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- MAIN CONTENT -->
  <div class="main-wrap" id="main-wrap">
    <header class="topbar">
      <button class="menu-btn" id="menu-btn">
        <i class="ti ti-menu-2"></i>
      </button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">

  <div class="theme-control">
    <i class="ti ti-palette"></i>

    <input
      type="range"
      id="theme-slider"
      min="40"
      max="310"
      value="170"
    />
  </div>

  <button class="icon-btn">
    <i class="ti ti-bell"></i>
  </button>

</div>
    </header>

    <main class="content-area" id="content-area">
</main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
